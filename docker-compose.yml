x-api-common: &api-common
  build:
    context: .
    dockerfile: docker/api.Dockerfile
    args:
      UV_EXTRAS: ${UV_EXTRAS:-}
      INSTALL_PLAYWRIGHT: ${INSTALL_PLAYWRIGHT:-false}
  environment:
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-socialmind}:${POSTGRES_PASSWORD:-socialmind}@${DATABASE_HOST:-host.docker.internal}:${DATABASE_PORT:-5432}/${DATABASE_NAME:-socialmind}
    REDIS_URL: redis://redis:6379/0
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-socialmind}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-socialmind}
    OLLAMA_URL: http://ollama:11434
    SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
    OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    EMBED_PROVIDER: ${EMBED_PROVIDER:-ollama}
    IMAGE_PROVIDER: ${IMAGE_PROVIDER:-dalle}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    MCP_API_KEY: ${MCP_API_KEY:-change-me}
    MCP_REQUIRE_AUTH: ${MCP_REQUIRE_AUTH:-true}
    CHROMADB_URL: http://chromadb:8002
    DEBUG: ${DEBUG:-false}
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - playwright_data:/ms-playwright
  depends_on:
    redis:
      condition: service_healthy
    ollama:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    profiles: ["docker-db"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-socialmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-socialmind}
      POSTGRES_DB: ${DATABASE_NAME:-socialmind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-socialmind} -d ${DATABASE_NAME:-socialmind}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-socialmind}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-socialmind}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chromadb_data:/chroma/chroma
    ports:
      - "${CHROMADB_HOST_PORT:-8002}:8000"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  api:
    <<: *api-common
    command: uvicorn socialmind.api.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  mcp:
    <<: *api-common
    command: uvicorn socialmind.mcp.app:app --host 0.0.0.0 --port 8001 --workers 1
    ports:
      - "${MCP_HOST_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    <<: *api-common
    command: >
      celery -A socialmind.scheduler.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=high,normal,low
      --hostname=worker@%h

  beat:
    <<: *api-common
    command: >
      celery -A socialmind.scheduler.celery_app beat
      --loglevel=info
      --scheduler=celery.beat:PersistentScheduler
      --schedule=/data/celerybeat-schedule
    volumes:
      - celery_beat_data:/data

  flower:
    <<: *api-common
    command: >
      celery -A socialmind.scheduler.celery_app flower
      --port=5555
      --basic_auth=admin:${FLOWER_PASSWORD:-flower}
    ports:
      - "${FLOWER_HOST_PORT:-5555}:5555"

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    ports:
      - "${UI_HOST_PORT:-3000}:80"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      mcp:
        condition: service_healthy
      ui:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  chromadb_data:
  ollama_data:
  playwright_data:
  celery_beat_data:
